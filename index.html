<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love_Proposal for Sekwa❤️❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #ff4f81;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

.container {
    text-align: center;
    width: 90%;
    max-width: 500px;
}

/* ✨ SOFT GLOW ON TEXT */
h1 {
    color: #ffffff;
    font-size: 1.6rem;
    min-height: 60px;
    margin-bottom: 20px; 
    text-shadow: 0 0 10px rgba(255,255,255,0.6),
                 0 0 20px rgba(255,105,180,0.5);
    animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
    from { text-shadow: 0 0 8px rgba(255,255,255,0.5); }
    to { text-shadow: 0 0 18px rgba(255,105,180,0.9); }
}

img {
    width: 180px;
    border-radius: 15px;
    margin: 10px;
}

.caption {
    color: #ffffff;
    margin-top: 5px;
    font-size: 14px;
}

/* ✨ BUTTONS */
.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 10px;
}

button {
    padding: 12px 22px;
    font-size: 15px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

#yesBtn {
    background: #22c55e;
    color: white;
}

#noBtn {
    background: #ef4444;
    color: white;
    position: relative;
}

/* ✨ SECOND PAGE IMAGES */
.secondImages {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
}

/* ✨ FADE-IN + GLOW */
.secondImages img {
    width: 45%;
    max-width: 180px;
    opacity: 0;
    transform: scale(0.9);
    animation: fadeInImage 1.5s ease forwards;
    box-shadow: 0 0 15px rgba(255,255,255,0.6),
                0 0 25px rgba(255,105,180,0.5);
    border-radius: 15px;
}

.secondImages img:nth-child(2) {
    animation-delay: 0.4s;
}

@keyframes fadeInImage {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* ✨ MESSAGE */
#message {
    margin-top: 20px;
    font-size: 16px;
    color: #ffffff;
    line-height: 1.4;
    opacity: 0;
    transform: translateY(10px);
    transition: 1s ease;
    text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

#message.show {
    opacity: 1;
    transform: translateY(0);
}

/* HEARTS */
.heart {
    position: absolute;
    animation: float 6s linear forwards;
    opacity: 0.8;
    color: #ffffff;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

    <img id="firstImage" src="https://i.imgur.com/fuUfqWv.jpeg">
    <div class="caption" id="caption">This could be US🥺</div>

    <h1 id="question"></h1>

    <div class="buttons">
        <button id="yesBtn">YES 💖</button>
        <button id="noBtn">NO</button>
    </div>

    <div id="message"></div>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let noClickCount = 0;
const text = 'System.out.print("Will you be my girlfriend Mahlobo omuhle?") 💖🥺';

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const question = document.getElementById("question");
const message = document.getElementById("message");
const music = document.getElementById("bgMusic");

// MUSIC START
document.body.addEventListener("click", () => {
    music.play().catch(() => {});
}, { once: true });

// TYPEWRITER
let i = 0;
function typeWriter() {
    if (i < text.length) {
        question.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}
typeWriter();

// NO BUTTON
noBtn.addEventListener("click", () => {
    noClickCount++;

    if (noClickCount === 1) {
        question.innerText = "Are you sure mama? 🥺";
    } else if (noClickCount === 2) {
        question.innerText = "Are you really really sure? Imina lo Mahlobo 🥺";
    } else if (noClickCount === 3) {
        question.innerText = "Last chance... 😢";
    } else if (noClickCount === 4) {
        question.innerText = "You can't escape me sisi wabantu😏 ";
    }
});

// MOVE BUTTON
noBtn.addEventListener("mouseenter", () => {
    if (noClickCount >= 4) {
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

        noBtn.style.position = "absolute";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }
});

// YES BUTTON
yesBtn.addEventListener("click", () => {

    question.innerText = "Forever thina 💕";

    message.innerHTML =
        "You’ve made the happiest man alive❤️🫂<br><br>" +
        "Into engizokuthanda yona mbhemu😁❤️but to be honest, namanje ngisaxolisa about how things unfolded before, it was never my intention to make you feel ngaleyandlela. I liked you kakhulu and I still do, and as I have said countless times before namanje ngisasho angeke ngahluleka ukukthanda Mahlobo🥺❤️ There's nothing I wouldn't do for you❤️. Your happiness would always come first coz that's how special you are kimi🥺❤️";

    message.classList.add("show");

    document.getElementById("firstImage").remove();
    document.getElementById("caption").remove();

    const imageContainer = document.createElement("div");
    imageContainer.className = "secondImages";

    const imgLeft = document.createElement("img");
    imgLeft.src = "https://i.imgur.com/TUZ0jAb.jpeg";

    const imgRight = document.createElement("img");
    imgRight.src = "https://i.imgur.com/J34dc8y.jpeg";

    imageContainer.appendChild(imgLeft);
    imageContainer.appendChild(imgRight);

    document.querySelector(".container").appendChild(imageContainer);

    noBtn.remove();
    yesBtn.remove();

    startHearts();
});

// HEARTS
function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";

        const emojis = ["❤️", "💕", "🫂"];
        heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.fontSize = (18 + Math.random() * 25) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 200);
}
</script>

</body>
</html>
